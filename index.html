<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngineer | Retro-Modern Glassmorphic</title>
    <link rel="icon" type="image/svg+xml" href="./assets/icon.svg" />
    <!-- Apply theme immediately to prevent flashing -->
    <script>
        (function() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const urlTheme = urlParams.get('mode');
                const savedTheme = localStorage.getItem('ngineer_theme');
                const theme = urlTheme || savedTheme || 'blue';
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'blue');
            }
        })();
    </script>
    <!-- Google Fonts for UI and Monospace Code -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <!-- Vue.js 3 via CDN for Zero-Install State Management -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div class="wael-bg wael-bg-left"></div>
    <div class="wael-bg wael-bg-right"></div>
    <div id="app" v-cloak>
        <header class="header glass-panel">
            <div class="header-content">
                <h1>Ngineer</h1>
                <p>Real-time, zero-install configuration builder.</p>
            </div>
            <div class="theme-switcher">
                <button @click="setTheme('light')" :class="{ active: theme === 'light' }" title="Light Mode">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                </button>
                <button @click="setTheme('dark')" :class="{ active: theme === 'dark' }" title="Dark Mode">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                </button>
                <button @click="setTheme('blue')" :class="{ active: theme === 'blue' }" title="Blue Mode">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg>
                </button>
                <button @click="setTheme('wael')" :class="{ active: theme === 'wael' }" title="Wael Mode" style="font-weight: 900; font-family: 'Inter', sans-serif; font-size: 15px;">
                    W
                </button>
            </div>
        </header>

        <main class="container">
            <!-- Left Column: Controls -->
            <section class="controls">
                
                <!-- Core & Routing Module -->
                <div class="card glass-panel module">
                    <h2>Core & Routing</h2>
                    
                    <div class="form-group">
                        <label for="domain">Domain Name</label>
                        <input type="text" id="domain" v-model="domain" placeholder="example.com">
                    </div>
                    
                    <div class="form-group">
                        <label for="listen_port">Listen Port</label>
                        <input type="number" id="listen_port" v-model="listen_port" placeholder="80">
                    </div>

                    <Transition name="fade-slide">
                        <div class="transition-content" v-if="!proxy_enabled">
                            <div class="form-group">
                                <label for="root_dir">Root Directory</label>
                                <input type="text" id="root_dir" v-model="root_dir" placeholder="/var/www/html">
                            </div>

                            <div class="form-group">
                                <label for="index_files">Index Files</label>
                                <input type="text" id="index_files" v-model="index_files" placeholder="index.html index.htm">
                            </div>

                            <div class="form-group toggle">
                                <label for="routing">Enable SPA Fallback (try_files)</label>
                                <label class="switch">
                                    <input type="checkbox" id="routing" v-model="routing">
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                    </Transition>
                </div>

                <!-- Reverse Proxy & Backend Module -->
                <div class="card glass-panel module">
                    <h2>Reverse Proxy & Backend</h2>
                    
                    <div class="form-group toggle">
                        <label for="proxy_enabled">Enable Reverse Proxy</label>
                        <label class="switch">
                            <input type="checkbox" id="proxy_enabled" v-model="proxy_enabled">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <Transition name="fade-slide">
                        <div class="transition-content" v-if="proxy_enabled">
                            <div class="form-group">
                                <label for="proxy_pass_url">Proxy URL (Backend)</label>
                                <input type="text" id="proxy_pass_url" v-model="proxy_pass_url" placeholder="http://127.0.0.1:3000">
                            </div>

                            <div class="form-group toggle">
                                <label for="websocket_support">WebSocket Support</label>
                                <label class="switch">
                                    <input type="checkbox" id="websocket_support" v-model="websocket_support">
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                    </Transition>
                </div>

                <!-- Security Module -->
                <div class="card glass-panel module">
                    <h2>Security</h2>

                    <div class="form-group toggle">
                        <label for="https_enabled">Enable HTTPS (SSL/TLS)</label>
                        <label class="switch">
                            <input type="checkbox" id="https_enabled" v-model="https_enabled">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <Transition name="fade-slide">
                        <div class="transition-content" v-if="https_enabled">
                            <div class="form-group toggle">
                                <label for="force_https_redirect">Force HTTP -> HTTPS Redirect</label>
                                <label class="switch">
                                    <input type="checkbox" id="force_https_redirect" v-model="force_https_redirect">
                                    <span class="slider"></span>
                                </label>
                            </div>
                            
                            <div class="form-group">
                                <label for="ssl_cert_path">SSL Certificate Path</label>
                                <input type="text" id="ssl_cert_path" v-model="ssl_cert_path" placeholder="/etc/ssl/certs/fullchain.pem">
                            </div>

                            <div class="form-group">
                                <label for="ssl_key_path">SSL Key Path</label>
                                <input type="text" id="ssl_key_path" v-model="ssl_key_path" placeholder="/etc/ssl/private/privkey.pem">
                            </div>
                        </div>
                    </Transition>

                    <div class="form-group toggle">
                        <label for="strict_security_headers">Strict Security Headers</label>
                        <label class="switch">
                            <input type="checkbox" id="strict_security_headers" v-model="strict_security_headers">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <!-- Performance & Limits Module -->
                <div class="card glass-panel module">
                    <h2>Performance & Limits</h2>

                    <div class="form-group toggle">
                        <label for="gzip_enabled">Enable Gzip Compression</label>
                        <label class="switch">
                            <input type="checkbox" id="gzip_enabled" v-model="gzip_enabled">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div class="form-group">
                        <label for="client_max_body_size">Max Client Body Size</label>
                        <input type="text" id="client_max_body_size" v-model="client_max_body_size" placeholder="10M">
                    </div>

                    <Transition name="fade-slide">
                        <div class="transition-content" v-if="!proxy_enabled">
                            <div class="form-group toggle">
                                <label for="static_asset_caching">Cache Static Assets</label>
                                <label class="switch">
                                    <input type="checkbox" id="static_asset_caching" v-model="static_asset_caching">
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                    </Transition>
                </div>

            </section>

            <!-- Right Column: Output -->
            <section class="output">
                <div class="sticky-wrapper">
                    <div class="card glass-panel code-card">
                        <div class="code-header">
                            <h3>Generated Configuration</h3>
                            <button class="btn glass-btn" @click="copyConfig" :class="{ copied: isCopied }">
                                {{ isCopied ? 'Copied!' : 'Copy to Clipboard' }}
                            </button>
                        </div>
                        <div class="code-container">
                            <pre><code class="nginx-output" v-text="generatedConfig"></code></pre>
                        </div>
                    </div>

                    <div class="card glass-panel command-card">
                        <h3>Deployment Commands</h3>
                        <p>Run these commands on your server to apply the config:</p>
                        <div class="code-container">
                            <pre><code class="bash-output" v-text="deploymentCommands"></code></pre>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer style="text-align: center; padding: 2rem; padding-top: 0; color: var(--text-secondary); font-size: 0.9rem;">
            Created by <a href="https://wael.work.gd/" target="_blank" style="color: var(--text-accent); text-decoration: none; font-weight: 600; transition: opacity 0.2s;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">Wael</a>
        </footer>
    </div>

    <!-- Application Logic -->
    <script src="./js/app.js"></script>
</body>
</html>
